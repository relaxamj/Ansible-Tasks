---
- name: Install Nginx and Deploy Website
  hosts: all
  become: true

  tasks:

    - name: Install Nginx
      yum:
        name: nginx
        state: present

    - name: Create web root directory
      file:
        path: /usr/share/nginx/html
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Deploy index.html
      copy:
        src: index.html
        dest: /usr/share/nginx/html/index.html
        owner: root
        group: root
        mode: '0644'

    - name: Start and Enable Nginx
      service:
        name: nginx
        state: started
        enabled: yes
